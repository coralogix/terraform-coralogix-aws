name: Version Validation

on:
  pull_request:
    branches: [master]
    types: [opened, edited, synchronize]

jobs:
  validate-version:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Get PR title type and calculate expected version
        id: version
        run: |
          # Get latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Parse current version (strip 'v' prefix)
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Get PR title from GitHub event
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "PR title: $PR_TITLE"

          # Determine bump type from PR title prefix
          if [[ "$PR_TITLE" =~ ^major: ]]; then
            NEXT_VERSION="v$((MAJOR + 1)).0.0"
            BUMP_TYPE="major"
          elif [[ "$PR_TITLE" =~ ^(feat|chore): ]]; then
            NEXT_VERSION="v${MAJOR}.$((MINOR + 1)).0"
            BUMP_TYPE="minor"
          elif [[ "$PR_TITLE" =~ ^fix: ]]; then
            NEXT_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            BUMP_TYPE="patch"
          elif [[ "$PR_TITLE" =~ ^(docs|ci|test): ]]; then
            # These don't trigger releases per .releaserc.json
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "PR type does not trigger a release, skipping version check"
            exit 0
          else
            echo "::error::PR title must start with fix:, feat:, major:, chore:, docs:, ci:, or test:"
            exit 1
          fi

          echo "expected_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Expected next version: $NEXT_VERSION ($BUMP_TYPE bump)"

      - name: Validate CHANGELOG.md version
        if: steps.version.outputs.skip != 'true'
        run: |
          EXPECTED="${{ steps.version.outputs.expected_version }}"

          # Get first version heading from CHANGELOG.md
          CHANGELOG_VERSION=$(grep -m1 '^## v' CHANGELOG.md | sed 's/## //')
          echo "CHANGELOG version: $CHANGELOG_VERSION"
          echo "Expected version: $EXPECTED"

          if [[ "$CHANGELOG_VERSION" != "$EXPECTED" ]]; then
            echo ""
            echo "::error::CHANGELOG.md version mismatch!"
            echo ""
            echo "Expected: $EXPECTED (based on PR title '${{ github.event.pull_request.title }}')"
            echo "Found:    $CHANGELOG_VERSION"
            echo ""
            echo "Please update CHANGELOG.md to use version $EXPECTED"
            exit 1
          fi

          echo "Version validated: $CHANGELOG_VERSION matches expected $EXPECTED"
