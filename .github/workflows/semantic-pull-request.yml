name: semantic-pull-request

on:
  pull_request:
    branches: [master]
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  semantic-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows release format
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        with:
          types: |
            fix
            feat
            major
            docs
            chore
            ci
            test
          requireScope: false
          validateSingleCommit: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Get PR title type and calculate expected version
        id: version
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          echo "PR title: $PR_TITLE"

          RE_BREAKING='^[a-z]+(\([^)]*\))?!:'
          RE_MAJOR='^major(\([^)]*\))?:'
          RE_MINOR='^(feat|chore)(\([^)]*\))?:'
          RE_PATCH='^fix(\([^)]*\))?:'
          RE_SKIP='^(docs|ci|test)(\([^)]*\))?:'

          if [[ "$PR_TITLE" =~ $RE_BREAKING ]]; then
            NEXT_VERSION="v$((MAJOR + 1)).0.0"
            BUMP_TYPE="major"
          elif [[ "$PR_TITLE" =~ $RE_MAJOR ]]; then
            NEXT_VERSION="v$((MAJOR + 1)).0.0"
            BUMP_TYPE="major"
          elif [[ "$PR_TITLE" =~ $RE_MINOR ]]; then
            NEXT_VERSION="v${MAJOR}.$((MINOR + 1)).0"
            BUMP_TYPE="minor"
          elif [[ "$PR_TITLE" =~ $RE_PATCH ]]; then
            NEXT_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            BUMP_TYPE="patch"
          elif [[ "$PR_TITLE" =~ $RE_SKIP ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "PR type does not trigger a release, skipping version check"
            exit 0
          else
            echo "::error::PR title must follow conventional commits format: type(optional-scope): description (e.g., fix:, feat(module):, fix!:)"
            exit 1
          fi

          echo "expected_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Expected next version: $NEXT_VERSION ($BUMP_TYPE bump)"

      - name: Validate CHANGELOG.md version
        if: steps.version.outputs.skip != 'true'
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.expected_version }}
        run: |
          echo "Expected version: $EXPECTED_VERSION"

          if ! grep -qF "## $EXPECTED_VERSION" CHANGELOG.md; then
            echo ""
            echo "::error::Version $EXPECTED_VERSION not found in CHANGELOG.md"
            echo ""
            echo "Please add a '## $EXPECTED_VERSION' heading to CHANGELOG.md"
            exit 1
          fi

          echo "Version validated: $EXPECTED_VERSION found in CHANGELOG.md"

      - name: Check version not already in Terraform Registry
        if: steps.version.outputs.skip != 'true'
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.expected_version }}
        run: |
          VERSION_NUM="${EXPECTED_VERSION#v}"
          REGISTRY_URL="https://registry.terraform.io/v1/modules/coralogix/aws/coralogix/versions"

          echo "Checking if $VERSION_NUM exists in Terraform Registry..."

          EXISTING=$(curl -sf "$REGISTRY_URL" | jq -r --arg v "$VERSION_NUM" \
            '.modules[0].versions | map(.version) | map(select(. == $v)) | .[0] // empty')

          if [ -n "$EXISTING" ]; then
            echo ""
            echo "::error::Version $VERSION_NUM already exists in Terraform Registry!"
            echo ""
            echo "This version was previously published and cannot be reused."
            echo "Please bump to the next version number."
            exit 1
          fi

          echo "Version $VERSION_NUM is available for release"
