name: semantic-pull-request

on:
  pull_request:
    branches: [master]
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  semantic-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows release format
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        with:
          types: |
            fix
            feat
            major
            docs
            chore
            ci
            test
          requireScope: false
          validateSingleCommit: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Get PR title type and calculate expected version
        id: version
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          echo "PR title: $PR_TITLE"

          if [[ "$PR_TITLE" =~ ^major: ]]; then
            NEXT_VERSION="v$((MAJOR + 1)).0.0"
            BUMP_TYPE="major"
          elif [[ "$PR_TITLE" =~ ^(feat|chore): ]]; then
            NEXT_VERSION="v${MAJOR}.$((MINOR + 1)).0"
            BUMP_TYPE="minor"
          elif [[ "$PR_TITLE" =~ ^fix: ]]; then
            NEXT_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            BUMP_TYPE="patch"
          elif [[ "$PR_TITLE" =~ ^(docs|ci|test): ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "PR type does not trigger a release, skipping version check"
            exit 0
          else
            echo "::error::PR title must start with fix:, feat:, major:, chore:, docs:, ci:, or test:"
            exit 1
          fi

          echo "expected_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Expected next version: $NEXT_VERSION ($BUMP_TYPE bump)"

      - name: Validate CHANGELOG.md version
        if: steps.version.outputs.skip != 'true'
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.expected_version }}
        run: |
          echo "Expected version: $EXPECTED_VERSION"

          if ! grep -q "$EXPECTED_VERSION" CHANGELOG.md; then
            echo ""
            echo "::error::Version $EXPECTED_VERSION not found in CHANGELOG.md"
            echo ""
            echo "Please add $EXPECTED_VERSION to CHANGELOG.md"
            exit 1
          fi

          echo "Version validated: $EXPECTED_VERSION found in CHANGELOG.md"
