receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  coralogix:
    domain: "${CORALOGIX_DOMAIN}"
    private_key: "${CORALOGIX_PRIVATE_KEY}"
    application_name: "ecs-ec2"
    subsystem_name: "otel-collector"
    timeout: 30s

extensions:
  health_check:

service:
  extensions:
    - health_check
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [coralogix]
    metrics:
      receivers: [otlp]
      exporters: [coralogix]
    logs:
      receivers: [otlp]
      exporters: [coralogix]